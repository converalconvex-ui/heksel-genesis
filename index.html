<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEKSEL GENESIS — NEO-KAI 01</<link rel="icon" type="image/png" href="logo.png">
   >
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syncopate:wght@400;700&family=Lexend:wght@200;400&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cyan: #00f5ff; --purple: #9b30ff; --pink: #ff00cc; --onyx: #060608; }

    body {
        background: var(--onyx);
        color: #fff;
        font-family: 'Lexend', sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }

    /* LINHA SCANNER CYBERPUNK */
    .scan-line {
        position: fixed; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(155,48,255,0.3), rgba(0,245,255,0.3), transparent);
        z-index: 9998; pointer-events: none; animation: scan 10s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }

    nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 500;
        padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center;
        background: linear-gradient(to bottom, rgba(6,6,8,0.95), transparent);
    }

    .nav-logo { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 0.5em; color: #fff; }

    .hero {
        position: relative; min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
        align-items: center; padding: 5rem 10% 0 10%; gap: 40px;
    }

    .hero-title {
        font-family: 'Syncopate', monospace; font-size: clamp(2.5rem, 5vw, 5rem);
        font-weight: 700; line-height: 0.9; margin: 1.5rem 0;
    }

    .line-gradient {
        background: linear-gradient(135deg, #ff00cc, #9b30ff, #00f5ff);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .hero-subtitle {
        font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-style: italic;
        color: rgba(255,255,255,0.4); margin-bottom: 2.5rem;
    }

    /* AJUSTE DA SUA IMAGEM */
    .shoe-container { position: relative; display: flex; justify-content: center; align-items: center; }
    
    .shoe-img {
        width: 100%; max-width: 600px; height: auto; z-index: 2;
        filter: drop-shadow(0 0 30px rgba(155,48,255,0.4));
        animation: float 6s ease-in-out infinite;
        border-radius: 20px; /* Como sua imagem tem cenário, um leve arredondado fica chique */
    }

    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    .btn-primary {
        padding: 1.2rem 2.5rem; background: linear-gradient(135deg, #9b30ff, #ff00cc);
        border: none; color: #fff; font-family: 'Syncopate', sans-serif; font-size: 0.6rem;
        letter-spacing: 0.3em; cursor: pointer; text-transform: uppercase; font-weight: 700;
        transition: 0.4s;
    }
    .btn-primary:hover { box-shadow: 0 0 30px var(--purple); transform: scale(1.05); }

    .stats { display: flex; gap: 40px; margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
    .stat-item { font-family: 'Syncopate'; }
    .stat-num { display: block; font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 8px; color: var(--cyan); letter-spacing: 3px; }

    @media (max-width: 900px) {
        .hero { grid-template-columns: 1fr; text-align: center; padding-top: 8rem; }
        .hero-subtitle { margin: 0 auto 2rem auto; }
        .stats { justify-content: center; }
    }
</style>
</head>
<body>

<div class="scan-line"></div>

<nav>
    <div class="nav-logo">HEKSEL</div>
    <div style="font-family: 'Syncopate'; font-size: 9px; color: var(--cyan); letter-spacing: 2px;">NEO-KAI // 2026</div>
</nav>

<section class="hero">
    <div class="hero-content">
        <div style="border: 1px solid var(--cyan); display: inline-block; padding: 4px 10px; font-size: 8px; font-family: 'Syncopate'; color: var(--cyan);">
            DROP 01 — EDIÇÃO LIMITADA
        </div>
        
        <h1 class="hero-title">
            HEKSEL<br><span class="line-gradient">GENESIS</span>
        </h1>

        <p class="hero-subtitle">
            A união brutal entre o design carioca e a estética de um futuro que ainda não aconteceu.
        </p>

        <a href="waitlist.html" style="text-decoration: none;">
    <button class="btn-primary">GARANTIR MEU ACESSO</button>
</a>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-num">EM BREVE</span>
                <span class="stat-label">INDISPONÍVEL</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">BRASIL TODO</span>
                <span class="stat-label">ORIGEM</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">VIP PERSONALIZADO</span>
                <span class="stat-label">MODELO</span>
            </div>
        </div>
    </div>

    <div class="shoe-container">
        <img src="tenis.png" alt="Heksel Genesis Shoe" class="shoe-img">
        <div style="position: absolute; width: 80%; height: 80%; background: radial-gradient(circle, rgba(155,48,255,0.15) 0%, transparent 70%); z-index: 1;"></div>
    </div>
</section>

<section style="padding: 100px 10%; text-align: center; background: #0c0c10;">
    <p style="font-family: 'Syncopate'; color: var(--cyan); letter-spacing: 10px; font-size: 10px; margin-bottom: 20px;">CONTAGEM REGRESSIVA</p>
    <h2 style="font-family: 'Syncopate'; font-size: clamp(3rem, 10vw, 8rem); font-weight: 100; opacity: 0.8;">14:15:00</h2>
    <p style="color: #444; font-size: 12px; margin-top: 20px; letter-spacing: 5px;">LANÇAMENTO MUNDIAL EM MAIO/2026</p>
</section>

<footer style="padding: 50px; text-align: center; border-top: 1px solid #111;">
    <p style="font-family: 'Syncopate'; font-size: 7px; color: #333; letter-spacing: 5px;">© 2026 HEKSEL IMPERIUM. TODOS OS DIREITOS RESERVADOS.</p>
</footer>

</body>
</html>
