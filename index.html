<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEKSEL GENESIS | Luxury Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glow-effect { box-shadow: 0 0 80px rgba(0, 110, 255, 0.25); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hero-gradient { background: radial-gradient(circle at center, rgba(0, 70, 255, 0.12) 0%, transparent 75%); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-text { animation: slideUp 1.2s ease-out forwards; }
    </style>
</head>
<body class="hero-gradient min-h-screen">
    <nav class="p-10 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-2xl font-bold tracking-[0.4em] uppercase">HEKSEL <span class="font-light text-gray-400">GENESIS</span></div>
        <div class="text-[10px] tracking-[0.3em] text-gray-500 uppercase font-bold">EST. 2026</div>
    </nav>

    <main class="flex flex-col items-center justify-center pt-10 px-6 text-center">
        <div class="animate-text">
            <h2 class="text-blue-500 text-xs tracking-[0.6em] uppercase mb-6 font-bold">O Império Hafy</h2>
            <h1 class="text-6xl md:text-9xl font-thin tracking-tighter mb-4 leading-none">HEKSEL</h1>
            <h1 class="text-5xl md:text-8xl font-black tracking-tighter mb-12 text-white">GENESIS</h1>
        </div>

        <div class="w-full max-w-5xl aspect-video glass-card rounded-3xl glow-effect flex items-center justify-center mb-16 relative overflow-hidden animate-text" style="animation-delay: 0.3s;">
             <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
             <span class="text-gray-500 text-sm tracking-[0.3em] uppercase italic">O Futuro Chegou nos Seus Pés</span>
        </div>

        <div class="animate-text" style="animation-delay: 0.6s;">
            <p class="max-w-2xl text-gray-400 text-lg md:text-xl font-light mb-12 leading-relaxed">
                A engenharia do tempo encontrou o design futurista. <br> Sinta o poder da <b>HEKSEL</b> em cada passo.
            </p>

            <div class="glass-card px-16 py-8 rounded-full inline-block mb-16 hover:scale-105 transition-transform duration-700">
                <div class="text-[10px] tracking-[0.5em] text-gray-500 mb-2 uppercase font-bold">Lançamento Mundial</div>
                <div class="text-7xl font-thin tracking-[0.2em] text-white">14:15</div>
            </div>

            <br>
            <button class="bg-white text-black px-16 py-5 text-[10px] font-black tracking-[0.4em] uppercase hover:bg-blue-600 hover:text-white transition-all duration-500 rounded-full mb-20 shadow-lg">
                Reservar meu Heksel Genesis
            </button>
        </div>
    </main>

    <footer class="pb-20 text-center">
        <p class="text-[9px] text-gray-800 tracking-[0.5em] uppercase font-bold">© 2026 HEKSEL IMPERIUM | TECNOLOGIA E LUXO</p>
    </footer>
</body>
</html>
