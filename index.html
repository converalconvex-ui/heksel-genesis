<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEKSEL GENESIS — NEO-KAI 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syncopate:wght@400;700&family=Lexend:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --cyan: #00f5ff; --purple: #9b30ff; --pink: #ff00cc; --onyx: #060608; --surface: #0c0c10; }

body {
  background: var(--onyx);
  color: #fff;
  font-family: 'Lexend', sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* EFEITOS VISUAIS */
.scan-line {
  position: fixed; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(155,48,255,0.3), rgba(0,245,255,0.3), transparent);
  z-index: 9998; pointer-events: none; animation: scan 10s linear infinite;
}
@keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(to bottom, rgba(6,6,8,0.95), transparent);
}

.nav-logo-text { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 0.5em; color: var(--purple); }

.hero {
  position: relative; min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
  align-items: center; padding-top: 5rem;
}

.hero-left { padding: 4rem 5rem; z-index: 2; }

.hero-badge {
  display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem;
  border: 1px solid rgba(0,245,255,0.2); background: rgba(0,245,255,0.04); margin-bottom: 1rem;
}

.hero-title {
  font-family: 'Syncopate', monospace; font-size: clamp(2.5rem, 4.5vw, 5rem);
  font-weight: 700; line-height: 1.0; margin-bottom: 2rem;
}

.line-gradient {
  background: linear-gradient(135deg, #ff00cc, #9b30ff, #00f5ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.hero-right { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; }

/* AJUSTE DA IMAGEM */
.shoe-img {
  width: 90%; height: auto; object-fit: contain; z-index: 2;
  filter: drop-shadow(0 0 30px rgba(155,48,255,0.3));
  animation: float 6s ease-in-out infinite;
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

.btn-primary {
  padding: 1.2rem 2.5rem; background: linear-gradient(135deg, #9b30ff, #ff00cc);
  border: none; color: #fff; font-family: 'Syncopate', sans-serif; font-size: 0.6rem;
  letter-spacing: 0.3em; cursor: pointer; text-transform: uppercase; font-weight: 700;
}

/* FORÇAR VISIBILIDADE */
.observe { opacity: 1 !important; transform: none !important; }

@media (max-width: 800px) {
  .hero { grid-template-columns: 1fr; text-align: center; }
  .hero-left { padding: 2rem; }
  .hero-right { height: 40vh; }
}
</style>
</head>
<body>

<div class="scan-line"></div>

<nav>
  <div class="nav-logo-text">HEKSEL</div>
  <div style="font-family: 'Syncopate'; font-size: 10px; color: var(--cyan);">NEO-KAI 01</div>
</nav>

<section class="hero">
  <div class="hero-left">
    <div class="hero-badge">
        <div style="width: 5px; height: 5px; background: var(--cyan); border-radius: 50%;"></div>
        <span style="font-family: 'Syncopate'; font-size: 8px; color: var(--cyan); letter-spacing: 2px;">DROP LIMITADO</span>
    </div>
    <h1 class="hero-title">
        <span style="color: white;">HEKSEL</span>
        <span class="line-gradient">GENESIS</span>
    </h1>
    <p style="font-family: 'Cormorant Garamond'; font-style: italic; color: #888; font-size: 1.5rem; margin-bottom: 2rem;">
        "O amanhã não se espera, se calça."
    </p>
    <button class="btn-primary">RESERVAR MEU PAR</button>
  </div>

  <div class="hero-right">
    <img src="tenis.jpg" alt="Heksel Genesis" class="shoe-img">
    <div style="position: absolute; width: 60%; height: 60%; background: radial-gradient(circle, rgba(155,48,255,0.2) 0%, transparent 70%);"></div>
  </div>
</section>

<section style="padding: 100px 20px; text-align: center; background: var(--surface);">
    <h2 style="font-family: 'Syncopate'; font-size: 10rem; color: rgba(255,255,255,0.03); position: absolute; left: 0; width: 100%; z-index: 0;">14:15</h2>
    <div style="position: relative; z-index: 1;">
        <p style="font-family: 'Syncopate'; letter-spacing: 10px; color: var(--cyan); font-size: 12px;">LANÇAMENTO EM</p>
        <p style="font-family: 'Syncopate'; font-size: 5rem; font-weight: 100; margin: 20px 0;">14:15</p>
        <p style="color: #444; font-size: 10px; letter-spacing: 5px;">MAIO 2026</p>
    </div>
</section>

</body>
</html>
